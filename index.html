<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>IB English IO Memorizer</title>
    <style>
        /* COGNITIVE COLOR THEME */
        :root {
            --bg-color: #f0f4f8;        
            --card-bg: #ffffff;         
            --text-main: #2d3748;       
            --text-secondary: #718096;  
            --accent: #3182ce;          
            --accent-active: #2b6cb0;
            --overlay: rgba(10, 20, 35, 0.4);
            --border: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;        
                --card-bg: #1e293b;         
                --text-main: #f1f5f9;       
                --text-secondary: #94a3b8;  
                --accent: #3b82f6;          
                --accent-active: #60a5fa;
                --overlay: rgba(0, 0, 0, 0.6);
                --border: #334155;
            }
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            line-height: 1.65;
            font-size: 18px; 
            overflow-x: hidden;
        }

        /* HEADER & NAVIGATION */
        .header {
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            padding: 15px 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            background: none;
            border: none;
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .menu-btn svg { width: 28px; height: 28px; fill: currentColor; }

        h1 {
            font-size: 20px; margin: 0; font-weight: 700;
            letter-spacing: -0.5px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }

        .controls {
            display: flex; gap: 10px; overflow-x: auto;
            padding-bottom: 10px; -webkit-overflow-scrolling: touch;
        }

        .controls::-webkit-scrollbar { display: none; }
        .controls.hidden { display: none; } /* Hide when pasting text */

        button.mode-btn {
            background-color: var(--card-bg); color: var(--accent);
            border: 2px solid var(--accent); padding: 8px 16px;
            border-radius: 20px; font-size: 15px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: all 0.2s ease;
        }

        button.mode-btn.active { background-color: var(--accent); color: #ffffff; }

        /* SIDEBAR DRAWER */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100vh;
            background-color: var(--card-bg); z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: env(safe-area-inset-top) 20px 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow-y: auto;
        }

        .sidebar.open { left: 0; }
        
        .sidebar h2 {
            font-size: 14px; text-transform: uppercase; color: var(--text-secondary);
            letter-spacing: 1px; margin: 20px 0 10px 10px;
        }

        .section-btn {
            background: none; border: none; text-align: left;
            padding: 15px 10px; font-size: 18px; color: var(--text-main);
            border-radius: 12px; margin-bottom: 5px; font-weight: 500;
            cursor: pointer; transition: background 0.2s;
        }

        .section-btn.active { background-color: var(--bg-color); color: var(--accent); font-weight: 700; }
        .add-btn { color: var(--accent); margin-top: 15px; border-top: 1px solid var(--border); border-radius: 0; padding-top: 20px; }

        /* OVERLAY */
        .overlay {
            display: none; position: fixed; inset: 0;
            background-color: var(--overlay); z-index: 900;
            backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
            opacity: 0; transition: opacity 0.3s ease;
        }

        .overlay.open { display: block; opacity: 1; }

        /* CONTENT AREAS */
        .content-area { padding-bottom: 50px; }
        .content-area.hidden { display: none; }

        .para-card {
            background-color: var(--card-bg); padding: 22px;
            border-radius: 16px; margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: opacity 0.3s ease;
        }

        .tap-to-reveal {
            text-align: center; color: var(--text-secondary); font-size: 16px;
            padding: 30px; background-color: var(--card-bg); border-radius: 16px;
            border: 2px dashed var(--text-secondary); cursor: pointer; margin-bottom: 16px;
        }

        /* PASTE / INPUT FORM */
        .input-form { display: none; padding-bottom: 50px; }
        .input-form.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); font-size: 16px;}
        
        input[type="text"], textarea {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--border); background-color: var(--card-bg);
            color: var(--text-main); font-family: inherit; font-size: 16px;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
        textarea { height: 350px; resize: none; line-height: 1.5; }

        .form-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-save { background-color: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .btn-cancel { background-color: transparent; color: var(--text-main); border: 2px solid var(--border); padding: 14px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SIDEBAR DRAWER -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <!-- Links are injected here by JS so they update dynamically -->
    </div>

    <!-- MAIN APP -->
    <div class="header">
        <div class="top-bar">
            <button class="menu-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24">
                    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                </svg>
            </button>
            <h1 id="current-section-title">Introduction</h1>
        </div>
        <div class="controls" id="mode-controls">
            <button id="btn-read" class="mode-btn active" onclick="setMode('read')">Read Text</button>
            <button id="btn-letters" class="mode-btn" onclick="setMode('letters')">First Letters</button>
            <button id="btn-step" class="mode-btn" onclick="setMode('step')">Line-by-Line</button>
        </div>
    </div>

    <!-- READING CONTENT -->
    <div id="content" class="content-area"></div>

    <!-- PASTE TEXT FORM -->
    <div id="input-form" class="input-form">
        <div class="form-group">
            <label>Section Title</label>
            <input type="text" id="new-title" placeholder="e.g., Conclusion, Literary Text...">
        </div>
        <div class="form-group">
            <label>Paste Script</label>
            <textarea id="new-script" placeholder="Paste your text here. &#10;&#10;Pressing Return (creating a new line) will automatically split the text into separate paragraphs for the app."></textarea>
        </div>
        <div class="form-actions">
            <button class="btn-save" onclick="saveNewSection()">Save Section</button>
            <button class="btn-cancel" onclick="cancelInput()">Cancel</button>
        </div>
    </div>

<script>
    // Initial script data
    let scriptData = {
        "Intro": [
            "In modern society, especially during times of war and conflict, migration is often reduced to a statistic and used as political rhetoric. Through this individual oral, I aim to examine the global issue of: how identity is stripped away from migrant communities through dehumanisation.",
            "To explore this global issue, I will first be examining the themes of dehumanization present in my chosen non literary work of the UKIP “Breaking Point” advertisement, specifically analysing how its visual composition and linguistic choices frame migrants as an anonymous, threatening collective. I will then analyse 3 other UKIP advertisement which all share similar themes of dehumanisation linked to the global issue.",
            "To provide an alternate perspective, I will then examine an extract from my literary text, The Best We Could Do by Thi Bui. Through this extract, I will explore how Bui utilizes the intimacy of her family’s migrant experience alongside her sequential art style to humanise the migrant experience and to reclaim their identity. I will then examine 3 other extracts throughout this graphic memoir which all demonstrate Bui’s attempt to humanise the migrant experience."
        ],
        "UKIP": [
            "I will now begin analysing my Non-Literary work of the “Breaking point” poster which was a part of UKIP’s 2016 political campaign.",
            "In this poster, the photographer captures a massive queue of refugees from a high angle with a deep depth of field. This specific framing causes the individuals in the background to blend together, transforming unique human identities into an anonymous collective. By denying these individuals close up shots, the advertisement prevents the audience from establishing any form of empathetic connection or resonating with them through shared humanity.",
            "UKIP also strategically employs exclusive and possessive pronouns to establish a rigid group dichotomy. By utilizing language such as 'The EU has failed US all’ and 'take back control of OUR borders,' the text directly creates a stark “Us versus Them” dynamic.",
            "The migrants are entirely excluded from the pronoun 'us,' meaning they are denied a shared human identity with the viewer. Instead of being framed as individual human beings who are part of a global community, they are depicted as the 'Other', an external, nameless force taking up national space and resources, effectively stripping away their identity as human asylum seekers.",
            "This visual erasure of identity is heavily reinforced by the poster’s aggressive linguistic choices. The capitalized masthead of “'BREAKING POINT, ” is shown in a high contrast red font, which naturally connotes danger and crisis. This design choice instantly commands the viewer's attention and forces them to emotionally associate the image of the migrants with an imminent threat, thus manipulating the viewer to align with UKIP’s perspective the matter.",
            "The term “BREAKING POINT” itself, functions as a metaphor borrowed from engineering, where it is typically used to describe the moment a material or infrastructure fractures under immense pressure. By imposing engineering terminology like “BREAKING POINT” into a photograph of moving people, it functions as a tool to strip these individuals of their human traits and reframes them as a heavy, lifeless mass.",
            "By pairing the image of migrants with terminology like “breaking point” and ”take back control,\" the poster strips these migrants of their human identity. As they are no longer presented as individuals fleeing conflict or seeking survival, but instead, they are reduced to a faceless collective threatening the country and its people."
        ],
        "UKIP Wider": [
            "I will now begin analysing my wider body of work, to demonstrate how UKIP's dehumanizing presentation of the global issue is a systemic choice throughout their broader political campaign.",
            "My first example is the \"EU Policy at Work\" poster, which depicts a white British construction worker sitting on the street as a beggar. This image is paired with the line “British workers are hit hard by unlimited cheap labor.” Here, the authorial choice to replace actual images of migrants with the abstract, dehumanizing phrase of \"cheap labour\" completely erases their personal identity and humanity. By reducing migrants to a purely economic threat and an exploitative statistic, the advertisement strips them of their individuality. This forces the audience to view migrants not as vulnerable individuals, but as an invisible, invasive force responsible for domestic economic suffering such as the one suffered by the British construction worker.",
            "This mechanical dehumanisation is also shown in my second example, UKIP’s \"No Border, No Control\" poster. Here, UKIP uses a visual metaphor of a giant escalator leading straight over the cliffs, accompanied by the text \"The EU has opened our borders to 4,000 people every week.\" By replacing the actual faces or stories of human beings with an escalator and a statistic, the poster strips away any bit of individual identity belonging to migrants. They are transformed in the public imagination from desperate individuals seeking refuge into an endless, machine-like flood pouring into the country through the escalator.",
            "In my final example, UKIP utilises the stark visual metaphor of a hand pointing directly at the viewer. This composition directly mirrors wartime propaganda, where the pointing hand is used to instill a sense of responsibility and triggers the soldiers sense of pathos to serve their country. However, UKIP uses this in a way that targets the viewer’s personal economic fear. It attacks the British viewer’s sense of job security, making them feel personally under threat by the foreign work force. The pronoun “they” is used once again to represent the entire migrant community in a dehumanising manner, as shown in the text, '26 million people in Europe are looking for work. And whose jobs are they after?' to further reinforce the central message that migrants and foreign workers are coming directly for you, the viewer's job."
        ]
    };

    let currentSection = 'Intro';
    let currentMode = 'read';
    let currentStepIndex = 0;
    
    // DOM Elements
    const contentDiv = document.getElementById('content');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const titleEl = document.getElementById('current-section-title');
    const modeControls = document.getElementById('mode-controls');
    const inputForm = document.getElementById('input-form');

    // Generate Sidebar Links Dynamically
    function renderSidebar() {
        let html = '<h2>Script Sections</h2>';
        Object.keys(scriptData).forEach(key => {
            const isActive = (currentSection === key && !inputForm.classList.contains('active')) ? 'active' : '';
            html += `<button class="section-btn ${isActive}" onclick="selectSection('${key}')">${key}</button>`;
        });
        html += `<button class="section-btn add-btn" onclick="showAddForm()">+ Add Custom Section</button>`;
        sidebar.innerHTML = html;
    }

    function toggleSidebar() {
        const isOpen = sidebar.classList.contains('open');
        if (isOpen) {
            sidebar.classList.remove('open');
            setTimeout(() => overlay.classList.remove('open'), 50);
        } else {
            renderSidebar(); // Refresh active states
            overlay.classList.add('open');
            sidebar.classList.add('open');
        }
    }

    function selectSection(section) {
        currentSection = section;
        titleEl.innerText = section;
        
        // Hide form, show content
        inputForm.classList.remove('active');
        contentDiv.classList.remove('hidden');
        modeControls.classList.remove('hidden');
        
        toggleSidebar(); // Close sidebar
        setMode('read'); // Reset to read mode
        window.scrollTo(0,0);
    }

    // Input Form Functions
    function showAddForm() {
        toggleSidebar(); // Close sidebar
        
        // Hide content, show form
        contentDiv.classList.add('hidden');
        modeControls.classList.add('hidden');
        inputForm.classList.add('active');
        
        titleEl.innerText = "New Section";
        document.getElementById('new-title').value = '';
        document.getElementById('new-script').value = '';
        window.scrollTo(0,0);
    }

    function cancelInput() {
        selectSection(currentSection); // Revert to previous section
    }

    function saveNewSection() {
        const titleInput = document.getElementById('new-title').value.trim();
        const scriptInput = document.getElementById('new-script').value;

        if (!titleInput) {
            alert("Please give your section a title.");
            return;
        }
        if (!scriptInput.trim()) {
            alert("Please paste some text for your script.");
            return;
        }

        // Split by new line, trim whitespace, remove empty paragraphs
        const newParagraphs = scriptInput.split(/\r?\n/).map(p => p.trim()).filter(p => p.length > 0);
        
        // Save to data object
        scriptData[titleInput] = newParagraphs;
        
        // Switch to the newly created section
        selectSection(titleInput);
    }

    // Memorization Logic
    function convertToFirstLetters(text) {
        return text.split(' ').map(word => {
            return word.replace(/[a-zA-Z0-9]+/g, match => {
                return match.charAt(0) + '•'.repeat(match.length - 1);
            });
        }).join(' ');
    }

    function setMode(mode) {
        currentMode = mode;
        currentStepIndex = 0;
        
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');

        renderContent();
    }

    function revealNextStep() {
        const paragraphs = scriptData[currentSection];
        if (currentStepIndex < paragraphs.length - 1) {
            currentStepIndex++;
            renderContent();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    function renderContent() {
        contentDiv.innerHTML = ''; 
        const paragraphs = scriptData[currentSection];

        if (currentMode === 'read') {
            paragraphs.forEach(p => {
                contentDiv.innerHTML += `<div class="para-card">${p}</div>`;
            });
        } 
        else if (currentMode === 'letters') {
            paragraphs.forEach(p => {
                contentDiv.innerHTML += `<div class="para-card" style="font-family: monospace; font-size: 17px; letter-spacing: 0.5px;">${convertToFirstLetters(p)}</div>`;
            });
        } 
        else if (currentMode === 'step') {
            for (let i = 0; i <= currentStepIndex; i++) {
                contentDiv.innerHTML += `<div class="para-card">${paragraphs[i]}</div>`;
            }
            if (currentStepIndex < paragraphs.length - 1) {
                contentDiv.innerHTML += `
                    <div class="tap-to-reveal" onclick="revealNextStep()">
                        Tap to reveal next paragraph
                    </div>
                `;
            } else {
                contentDiv.innerHTML += `
                    <div class="tap-to-reveal" onclick="setMode('step')">
                        End of section. Tap to restart.
                    </div>
                `;
            }
        }
    }

    // Initialize App
    renderSidebar();
    selectSection(currentSection);
</script>
</body>
</html>
